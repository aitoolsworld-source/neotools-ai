<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Store</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.card{
background:white;
width:180px;
margin:10px;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

button{
background:green;
color:white;
border:none;
padding:8px;
width:100%;
margin-top:5px;
border-radius:5px;
cursor:pointer;
}

#cart{
position:fixed;
bottom:10px;
right:10px;
background:black;
color:white;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>🛒 My Quick Store</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/150">
<h4>Product 1</h4>
<p>₹199</p>
<button onclick="add('Product 1')">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h4>Product 2</h4>
<p>₹299</p>
<button onclick="add('Product 2')">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h4>Product 3</h4>
<p>₹399</p>
<button onclick="add('Product 3')">Add</button>
</div>

</div>

<div id="cart">
Cart: <span id="count">0</span>
<br><br>
<button onclick="order()">WhatsApp Order</button>
</div>

<script>
let count=0;
let items=[];

function add(p){
items.push(p);
count++;
document.getElementById("count").innerText=count;
}

function order(){
let number="91XXXXXXXXXX";
let msg="Order: "+items.join(", ");
window.open("https://wa.me/"+number+"?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
